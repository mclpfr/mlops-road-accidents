global:
  scrape_interval: 15s # By default, scrape targets every 15 seconds.

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api_service:8000'] # 'api_service' is the container name in docker-compose

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor_service:8080']
