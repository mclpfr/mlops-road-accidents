apiVersion: v1
kind: Pod
metadata:
  name: debug-data-volume
spec:
  containers:
  - name: debug
    image: ubuntu:22.04
    command: ["sleep", "3600"]
    volumeMounts:
    - name: data
      mountPath: /app/data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: mlops-data
  restartPolicy: Never
