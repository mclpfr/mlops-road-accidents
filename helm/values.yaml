    repository: grafana/grafana
    tag: "10.2.2"
  credentials:
    adminUser: admin
    adminPassword: admin
  service:
    port: 3000
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

