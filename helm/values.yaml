# Global values
global:
  userInfo:
    userId: "1000"
    groupId: "1000"

# Storage configuration
persistence:
  postgres:
    enabled: true
    size: 1Gi
  grafana:
    enabled: true
    size: 1Gi
  mlopsData:
    enabled: true
    size: 1Gi
  modelsData:
    enabled: true
    size: 1Gi

# Services configuration
extractData:
  image:
    repository: mclpfr/extract_data_service
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

synthetData:
  image:
    repository: mclpfr/synthet_data_service
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

prepareData:
  image:
    repository: mclpfr/prepare_data_service
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

trainModel:
  image:
    repository: mclpfr/train_model_service
    tag: latest
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

postgres:
  image:
    repository: postgres
    tag: "15.5"
  credentials:
    username: postgres
    password: postgres
    database: road_accidents
  service:
    port: 5432
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

dataImport:
  image:
    repository: mclpfr/data_import_service
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

grafana:
